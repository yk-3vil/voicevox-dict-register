# VOICEVOX ユーザー辞書定義ファイル
#
# 書式:
#   - surface: 登録する単語（表層形）
#     pronunciation: カタカナ読み
#     accent_type: アクセント核の位置（0=平板, 1以上=その位置に核）
#     word_type: 品詞（省略時: PROPER_NOUN）
#       PROPER_NOUN / COMMON_NOUN / VERB / ADJECTIVE / SUFFIX
#     priority: 優先度 0-10（省略時: 5、高いほど優先）

